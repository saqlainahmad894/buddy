name: buddy
description: Your private offline-first companion — listens, values you, and walks with you toward Allah.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.5
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  uuid: ^4.5.1
  intl: ^0.20.2
  google_fonts: ^6.2.1
  flutter_local_notifications: ^19.3.0
  timezone: ^0.10.1
  flutter_timezone: ^4.1.0
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  path: ^1.9.1
  http: ^1.4.0
  record: ^6.0.0
  audioplayers: ^6.4.0
  adhan: ^2.0.0+1
  permission_handler: ^12.0.0+1
  flutter_native_splash: ^2.4.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/brand/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/brand/buddy_logo.png
  adaptive_icon_background: "#F3EDE2"
  adaptive_icon_foreground: assets/brand/buddy_logo.png
  adaptive_icon_foreground_inset: 18
  remove_alpha_ios: true
  web:
    generate: true
    image_path: assets/brand/buddy_logo.png
    background_color: "#F3EDE2"
    theme_color: "#1F4A48"
  windows:
    generate: true
    image_path: assets/brand/buddy_logo.png
  macos:
    generate: true
    image_path: assets/brand/buddy_logo.png

flutter_native_splash:
  color: "#F3EDE2"
  color_dark: "#0B1618"
  image: assets/brand/buddy_logo.png
  image_dark: assets/brand/buddy_logo.png
  android_12:
    color: "#F3EDE2"
    color_dark: "#0B1618"
    image: assets/brand/buddy_logo.png
    image_dark: assets/brand/buddy_logo.png
    icon_background_color: "#F3EDE2"
    icon_background_color_dark: "#0B1618"
  ios: true
  web: true
  fullscreen: true
